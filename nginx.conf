events {
    worker_connections 4096;  # Increased for high load (2000 RPS)
    use epoll;  # Efficient event handling on Linux
    multi_accept on;  # Accept multiple connections at once
}

http {
    # Rate limiting DISABLED for load testing
    # Enable in production with appropriate limits
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    # limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    # limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    
    # Set maximum payload size
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    
    # Upstream with load balancing
    # Docker DNS automatically resolves to all app instances
    upstream app_server {
        least_conn;  # Route to instance with fewest active connections
        server app:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;  # Keep connections alive for better performance
    }

    server {
        listen 80;
        server_name localhost;

        # Rate limiting DISABLED for load testing
        # Uncomment in production:
        # limit_conn conn_limit 100;
        # limit_req zone=api_limit burst=50 nodelay;
        # limit_req_status 429;
        
        # Increase timeout for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        location / {
            proxy_pass http://app_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check endpoint (no rate limiting)
        location /health {
            proxy_pass http://app_server/health;
            access_log off;
        }
    }
}

